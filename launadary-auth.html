<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lunadary Wallaah — Auth</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="launadary-auth.css" />
</head>

<body>

  <!-- Decorative orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="card-wrap">
    <div class="card">

      <!-- ── Brand / Logo ── -->
      <div class="brand">
        <div class="brand-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Washing machine body -->
            <rect x="4" y="5" width="32" height="30" rx="4" fill="white" fill-opacity="0.15" stroke="white"
              stroke-width="1.8" />
            <!-- Control panel top strip -->
            <rect x="4" y="5" width="32" height="7" rx="4" fill="white" fill-opacity="0.25" />
            <!-- Power dot -->
            <circle cx="11" cy="8.5" r="1.6" fill="white" fill-opacity="0.9" />
            <!-- Two setting dots -->
            <circle cx="17" cy="8.5" r="1.2" fill="white" fill-opacity="0.55" />
            <circle cx="21" cy="8.5" r="1.2" fill="white" fill-opacity="0.55" />
            <!-- Door circle outer -->
            <circle cx="20" cy="24" r="10" fill="white" fill-opacity="0.1" stroke="white" stroke-width="1.6" />
            <!-- Door circle inner glass -->
            <circle cx="20" cy="24" r="7" fill="white" fill-opacity="0.08" stroke="white" stroke-width="1.2"
              stroke-dasharray="2 1.5" />
            <!-- Spinning clothes arc -->
            <path d="M15.5 21 Q18 17.5 22 20 Q25 22 22.5 26" stroke="white" stroke-width="2" stroke-linecap="round"
              fill="none" opacity="0.85" />
            <!-- Water bubbles -->
            <circle cx="17" cy="26" r="1" fill="white" fill-opacity="0.6" />
            <circle cx="22" cy="27.5" r="0.8" fill="white" fill-opacity="0.5" />
            <!-- Bottom panel line -->
            <line x1="8" y1="33" x2="32" y2="33" stroke="white" stroke-width="1" stroke-opacity="0.3" />
          </svg>
        </div>
        <h1>Luna<span>dary</span> Wallaah</h1>
        <p>Services Platform</p>
      </div>

      <!-- ── Tabs ── -->
      <div class="tabs" role="tablist">
        <button class="tab-btn active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Sign
          In</button>
        <button class="tab-btn" id="tab-signup" role="tab" aria-selected="false" onclick="switchTab('signup')">Create
          Account</button>
      </div>

      <!-- ── LOGIN PANEL ── -->
      <div class="form-panel active" id="panel-login">

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-wrap">
            <span class="icon">✉</span>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="login-pw">Password</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="login-pw" placeholder="Enter your password" autocomplete="current-password" />
            <button class="toggle-pw" type="button" onclick="togglePw('login-pw', this)"
              aria-label="Toggle password">👁</button>
          </div>
        </div>

        <div class="form-footer-row">
          <label class="remember">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button class="btn-primary" type="button" onclick="handleLogin()">Sign In →</button>

        <div class="divider">or continue with</div>

        <div class="social-row">
          <button class="btn-social" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Google
          </button>
          <button class="btn-social" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
            Facebook
          </button>
        </div>

      </div><!-- /panel-login -->

      <!-- ── SIGNUP PANEL ── -->
      <div class="form-panel" id="panel-signup">

        <div class="row-2">
          <div class="form-group">
            <label for="su-fname">First Name</label>
            <div class="input-wrap">
              <span class="icon">👤</span>
              <input type="text" id="su-fname" placeholder="Luna" autocomplete="given-name" />
            </div>
          </div>
          <div class="form-group">
            <label for="su-lname">Last Name</label>
            <div class="input-wrap">
              <span class="icon">👤</span>
              <input type="text" id="su-lname" placeholder="Wallaah" autocomplete="family-name" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="su-email">Email Address</label>
          <div class="input-wrap">
            <span class="icon">✉</span>
            <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="su-phone">Phone Number</label>
          <div class="input-wrap">
            <span class="icon">📞</span>
            <input type="tel" id="su-phone" placeholder="+1 000 000 0000" autocomplete="tel" />
          </div>
        </div>

        <div class="form-group">
          <label for="su-pw">Password</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="su-pw" placeholder="Create a strong password" oninput="checkStrength(this.value)"
              autocomplete="new-password" />
            <button class="toggle-pw" type="button" onclick="togglePw('su-pw', this)"
              aria-label="Toggle password">👁</button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="su-pw2">Confirm Password</label>
          <div class="input-wrap">
            <span class="icon">🔑</span>
            <input type="password" id="su-pw2" placeholder="Repeat your password" autocomplete="new-password" />
            <button class="toggle-pw" type="button" onclick="togglePw('su-pw2', this)"
              aria-label="Toggle password">👁</button>
          </div>
        </div>

        <button class="btn-primary" type="button" onclick="handleSignup()">Create Account →</button>

        <p class="terms-note">
          By creating an account you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>

      </div><!-- /panel-signup -->

    </div><!-- /.card -->
  </div><!-- /.card-wrap -->

  <script>
    /* ── Tab switching ── */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    /* ── Password visibility toggle ── */
    function togglePw(inputId, btn) {
      const inp = document.getElementById(inputId);
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁'; }
    }

    /* ── Password strength indicator ── */
    function checkStrength(pw) {
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const levels = ['', 'weak', 'fair', 'good', 'strong'];
      for (let i = 1; i <= 4; i++) {
        document.getElementById('seg' + i).className =
          'strength-seg ' + (i <= score ? levels[score] : '');
      }
    }

    /* ── Form validation ── */
    function validate(fields) {
      for (const [id, msg] of fields) {
        const el = document.getElementById(id);
        if (!el.value.trim()) { el.focus(); alert(msg); return false; }
      }
      return true;
    }

    function handleLogin() {
      if (!validate([
        ['login-email', 'Please enter your email.'],
        ['login-pw', 'Please enter your password.']
      ])) return;
      alert('✅ Signed in successfully! Welcome back.');
    }

    function handleSignup() {
      if (!validate([
        ['su-fname', 'Please enter your first name.'],
        ['su-lname', 'Please enter your last name.'],
        ['su-email', 'Please enter your email.'],
        ['su-pw', 'Please create a password.'],
        ['su-pw2', 'Please confirm your password.']
      ])) return;

      if (document.getElementById('su-pw').value !== document.getElementById('su-pw2').value) {
        alert('❌ Passwords do not match.');
        return;
      }
      alert('🎉 Account created! Welcome to Lunadary Wallaah Services.');
    }
  </script>

</body>

</html>
